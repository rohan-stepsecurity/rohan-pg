name: Caller Workflow (Environment Secrets)

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------
  # Job 1: Deploy to Dev
  # Passes dev environment secrets via inherit
  # ---------------------------------------------------
  deploy-dev:
    uses: ./.github/workflows/reu-env.yml
    secrets: inherit
    with:
      environment: dev

  # ---------------------------------------------------
  # Job 2: Deploy to Prod
  # Passes prod environment secrets via inherit
  # ---------------------------------------------------
  deploy-prod:
    needs: deploy-dev
    uses: ./.github/workflows/reusable-deploy.yml
    secrets: inherit
    with:
      environment: prod
