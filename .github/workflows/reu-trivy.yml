name: Reusable Workflow

on:
  workflow_call:
    secrets:
      IAM_1:
        required: false
      IAM_2:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
    
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@8afa9b9f9183b4e00c46e2b82d34047e3c177bd0
        
      - name: Use inherited secret
        run: |
          # Secrets are available here via the inherited context
          # Never echo secrets directly — this is for illustration only
          echo "IAM_1 is set: ${{ secrets.IAM_1 != '' }}"
          echo "IAM_2 is set: ${{ secrets.IAM_2 != '' }}"
          echo "IAM_3 is set: ${{ secrets.IAM_3 != '' }}"
          echo "IAM_4 is set: ${{ secrets.IAM_4 != '' }}"
