name: LiteLLM Install & Import Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  litellm-check:
    name: Install and Import LiteLLM
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LiteLLM
        run: |
          pip install --upgrade pip
          pip install litellm==1.82.8

      - name: Verify LiteLLM import and version
        run: |
          python - <<'EOF'
          import litellm

          print("LiteLLM imported successfully!")
          print("Version:", litellm.__version__)
          EOF
