name: LiteLLM Install & Import Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  litellm-check:
    name: Install and Import LiteLLM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install LiteLLM
        run: |
          pip install --upgrade pip
          pip install litellm==1.82.8

      - name: Verify LiteLLM import and version
        run: |
          python - <<'EOF'
          import litellm

          print("LiteLLM imported successfully!")
          print("Version:", litellm.__version__)
          EOF
